name: Build and push php-dev

on:
  push:
    branches: [main]
    paths:
      - 'php-dev:8.5/**'
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/fransverbeek/php-dev
          tags: |
            type=semver,pattern=8.5v{{version}}
            type=raw,value=8.5
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ./php-dev:8.5
          push: true
          tags: ${{ steps.meta.outputs.tags }}
